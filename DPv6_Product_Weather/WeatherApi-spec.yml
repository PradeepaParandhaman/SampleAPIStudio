openapi: 3.0.3
info:
  title: Singapore Air Temperature API
  version: '1'
  description: |
    This API provides real-time air temperature data for Singapore, sourced from the National Environment Agency (NEA). It is designed to demonstrate IBM API Connect capabilities using the DataPower API Gateway (v6).

    The API exposes a single GET endpoint at /environment/air-temperature that retrieves current temperature readings from multiple weather stations across Singapore.
    Gateway Type: DataPower API Gateway (v6)
    Security: The API uses API Key authentication via the X-IBM-Client-Id header (clientID security scheme).

    Assembly Policies: The DataPower Assembly (DPv6_Assembly) includes:
    - Invoke Policy: Routes requests to the backend NEA environment API with a 60-second timeout, protocol-based caching (900s TTL), and header control using an allowlist approach

    API Settings:
    Though CORS and Activity Logging are part of the DPv6_Assembly, they are not available as policies in the form view but are categorized under API settings in the outline view.
    - CORS: Enabled to support cross-origin requests
    - Activity Logging: Enabled with activity content logged on success and full payload on errors

    Product & Plan:
    Products and Plans are not tightly coupled to individual APIs, allowing flexible packaging and reuse across multiple APIs.
    This API is packaged in DPv6_Product with DPv6_Plan that includes:
    - Quota Limiting: 100 requests per minute quota (DPv6_Quota) with blocking behavior when limit is reached.
      Quota limiting is enforced at the plan level - when users subscribe to a plan, the quota applies to all their requests under that subscription.
servers:
  - url: /environment
    description: Base URL for NEA environment data API
paths:
  /air-temperature:
    get:
      summary: Get air temperature readings across Singapore
      description: |
        Returns the current (or recent) air temperature observations across multiple stations in Singapore.
        The dataset covers May 2016 to present.
      parameters:
        - name: station_id
          in: query
          description: The station identifier to filter by a specific station (optional)
          required: false
          schema:
            type: string
            example: S101
        - name: start_time
          in: query
          description: ISO-8601 timestamp to filter readings from this time (optional)
          required: false
          schema:
            type: string
            format: date-time
            example: '2025-11-11T00:00:00+08:00'
        - name: end_time
          in: query
          description: ISO-8601 timestamp to filter readings up to this time (optional)
          required: false
          schema:
            type: string
            format: date-time
            example: '2025-11-11T12:00:00+08:00'
      responses:
        '200':
          description: Successful retrieval of air-temperature readings
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    description: List of station temperature readings
                    items:
                      $ref: '#/components/schemas/StationReading'
                  api_info:
                    $ref: '#/components/schemas/ApiInfo'
        '400':
          description: Bad request e.g., invalid query parameter
        '500':
          description: Internal server error
components:
  schemas:
    StationReading:
      type: object
      properties:
        station_id:
          type: string
          description: Unique station identifier
          example: S101
        timestamp:
          type: string
          format: date-time
          description: The time of the reading
          example: '2025-11-11T12:05:00+08:00'
        temperature:
          type: number
          format: float
          description: Air temperature in degree Celsius
          example: 29.7
      required:
        - station_id
        - timestamp
        - temperature
    ApiInfo:
      type: object
      properties:
        status:
          type: string
          description: Status of the API response
          example: healthy
        version:
          type: string
          description: API version
          example: v1
      required:
        - status
        - version
  securitySchemes:
    clientID:
      name: X-IBM-Client-Id
      in: header
      description: ''
      type: apiKey
security:
  - clientID: []
